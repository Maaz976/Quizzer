apiVersion: apps/v1
kind: Deployment
metadata:
  name: quizzer-web

spec:
  replicas: 1

  selector:
    matchLabels:
      app: quizzer-web

  template:
    metadata:
      labels:
        app: quizzer-web

    spec:
      containers:
      - name: quizzer-web

        image: ghcr.io/maaz976/quizzer-web:1.0

        ports:
        - containerPort: 80

        env:
        - name: DB_HOST
          value: mysql

        - name: DB_NAME
          value: Quizzer

        - name: DB_USER
          value: root

        - name: DB_PASS
          value: rootpass